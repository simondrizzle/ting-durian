<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="10" y1="6" x2="70" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8f4ff"/>
      <stop offset="1" stop-color="#cfe3ff"/>
    </linearGradient>
    <linearGradient id="dress" x1="28" y1="48" x2="52" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B8BEB"/>
      <stop offset="1" stop-color="#1A5FB4"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="22" fill="url(#bg)"/>
  <!-- hair back -->
  <ellipse cx="40" cy="34" rx="24" ry="22" fill="#3d2b1f"/>
  <!-- face -->
  <circle cx="40" cy="36" r="18" fill="#ffe0c2"/>
  <!-- hair front -->
  <path d="M22 34c2-14 16-22 30-18 10 3 16 12 16 22 0 4-2 8-4 10-4-10-12-16-22-16s-18 6-22 16c-2-2-4-6-4-10 0-4 2-8 6-14z" fill="#4a3728"/>
  <path d="M18 30c4-8 12-14 22-14s18 6 22 14" stroke="#4a3728" stroke-width="3" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="33" cy="37" r="2.2" fill="#2d3748"/>
  <circle cx="47" cy="37" r="2.2" fill="#2d3748"/>
  <circle cx="33.8" cy="36.2" r="0.8" fill="#fff"/>
  <circle cx="47.8" cy="36.2" r="0.8" fill="#fff"/>
  <!-- blush -->
  <ellipse cx="28" cy="41" rx="3" ry="1.8" fill="#ffb4a2" opacity="0.55"/>
  <ellipse cx="52" cy="41" rx="3" ry="1.8" fill="#ffb4a2" opacity="0.55"/>
  <!-- smile -->
  <path d="M34 43 Q40 47 46 43" stroke="#d97b6c" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- body / dress -->
  <path d="M24 54c4 8 10 12 16 12s12-4 16-12c-2 10-8 16-16 16s-14-6-16-16z" fill="url(#dress)"/>
  <!-- 婷 on dress -->
  <text x="40" y="63" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#ffffff">婷</text>
  <!-- small durian clip -->
  <circle cx="56" cy="24" r="7" fill="#7cb342"/>
  <path d="M56 17l1.5 4h-3z" fill="#558b2f"/>
  <path d="M53 21l1.2 3.5h-2.4z" fill="#558b2f"/>
  <path d="M59 21l1.2 3.5h-2.4z" fill="#558b2f"/>
</svg>
